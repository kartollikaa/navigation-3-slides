<script src="vendor/reveal/reveal.js"></script>
<script>
(function(){
  var data = JSON.parse(document.getElementById('slides-data').textContent);
  var SW = data.w, SH = data.h;
  var root = document.getElementById('slides');

  data.slides.forEach(function(s){
    var sec = document.createElement('section');
    sec.className = 'slide-img';
    var num = ('0'+s.n).slice(-2);
    sec.setAttribute('data-background-image', 'slides/slide-'+num+'.webp');
    sec.setAttribute('data-background-size', 'contain');
    sec.setAttribute('data-background-color', '#000000');

    var layer = document.createElement('div');
    layer.className = 'txt-layer';
    layer.style.width = SW+'px';
    layer.style.height = SH+'px';

    (s.boxes||[]).forEach(function(b){
      var d = document.createElement('div');
      d.className = 'tx';
      d.style.left = b.l+'px'; d.style.top = b.t+'px';
      d.style.width = b.w+'px'; d.style.height = b.h+'px';
      var lines = (b.paras && b.paras.length) || 1;
      (b.paras||[]).forEach(function(p){
        var line = document.createElement(p.href ? 'a' : 'div');
        line.textContent = p.t;
        if(p.href){ line.setAttribute('href', p.href); line.setAttribute('target','_blank'); line.setAttribute('rel','noopener noreferrer'); }
        var fs = p.fs;
        if(!fs){ fs = Math.max(8, Math.min(40, (b.h/lines)*0.72)); }
        line.style.fontSize = fs+'px';
        if(p.b) line.style.fontWeight = '700';
        if(p.a && p.a.indexOf('CENTER')>=0) line.style.textAlign='center';
        else if(p.a && p.a.indexOf('RIGHT')>=0) line.style.textAlign='right';
        d.appendChild(line);
      });
      layer.appendChild(d);
    });
    sec.appendChild(layer);
    root.appendChild(sec);
  });

  Reveal.initialize({
    width: SW, height: SH, margin: 0,
    minScale: 0.1, maxScale: 4,
    center: false, hash: true, controls: true, progress: true,
    slideNumber: 'c/t', overview: true,
    transition: 'slide', backgroundTransition: 'fade',
    keyboard: { 84: function(){ document.body.classList.toggle('show-text'); } } // T
  }).then(function(){
    document.getElementById('loading').style.display='none';
    setTimeout(function(){ var h=document.getElementById('hint'); if(h) h.style.opacity='0'; }, 6000);
  });
})();
</script>
